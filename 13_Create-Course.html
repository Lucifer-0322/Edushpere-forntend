<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Create Course</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="mb-6">
            <a href="04_Teacher-Dashboard.html" class="text-xs font-semibold text-teal-600 hover:underline">&larr; Back to Control Center</a>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Create New Course</h1>
            <p class="text-sm text-slate-500">Publish a new classroom that students can enroll into.</p>
        </div>

        <div id="successAlert" class="hidden mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded text-green-800 text-sm">
            ✅ Course published successfully! Redirecting...
        </div>

        <div id="errorAlert" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded text-red-700 text-sm">
            <span id="errorMessage">Something went wrong.</span>
        </div>

        <form id="createCourseForm" class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs space-y-4">
            <div>
                <label class="block text-sm font-medium text-slate-700">Course Title</label>
                <input type="text" id="courseTitle" required
                    class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm"
                    placeholder="e.g., App Development Fundamentals">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700">Course Description</label>
                <textarea id="courseDescription" required rows="4"
                    class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm"
                    placeholder="What will students learn in this course?"></textarea>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition cursor-pointer shadow-xs disabled:opacity-50">
                Publish Course
            </button>
        </form>
    </main>

    <script>
        const BASE = "https://edushpere-backend-production.up.railway.app";
        const token = localStorage.getItem("token");

        document.getElementById("createCourseForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById("submitBtn");
            const errorAlert = document.getElementById("errorAlert");
            const errorMessage = document.getElementById("errorMessage");
            const successAlert = document.getElementById("successAlert");

            errorAlert.classList.add("hidden");
            successAlert.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerText = "Publishing...";

            const payload = {
                title: document.getElementById("courseTitle").value,
                description: document.getElementById("courseDescription").value
            };

            try {
                const res = await fetch(`${BASE}/api/courses`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Failed to create course.");
                }

                successAlert.classList.remove("hidden");
                setTimeout(() => {
                    window.location.href = "04_Teacher-Dashboard.html";
                }, 1800);

            } catch (err) {
                errorMessage.innerText = err.message;
                errorAlert.classList.remove("hidden");
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Course";
            }
        });
    </script>
</body>
</html>
