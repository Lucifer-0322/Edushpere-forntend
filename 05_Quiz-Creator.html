<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Build Assessment</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="mb-6">
            <a href="04_Teacher-Dashboard.html" class="text-xs font-semibold text-teal-600 hover:underline">&larr; Back to Control Center</a>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Build New Quiz</h1>
            <p class="text-sm text-slate-500">Configure objective assessments for the auto-grading system.</p>
        </div>

        <!-- Success Alert -->
        <div id="successAlert" class="hidden mb-6 p-4 bg-green-50 border-l-4 border-green-500 rounded text-green-800 text-sm">
            ✅ Quiz published successfully! Redirecting...
        </div>

        <!-- Error Alert -->
        <div id="errorAlert" class="hidden mb-6 p-4 bg-red-50 border-l-4 border-red-500 rounded text-red-700 text-sm">
            <span id="errorMessage">Something went wrong.</span>
        </div>

        <form id="createQuizForm" class="space-y-6">

            <!-- Quiz Info -->
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Quiz Title</label>
                    <input type="text" id="quizTitle" required
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm"
                        placeholder="e.g., Quiz 2: Advanced Flexbox Mapping">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Topic</label>
                    <input type="text" id="quizTopic" required
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm"
                        placeholder="e.g., CSS Layouts">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Select Course</label>
                    <select id="courseId" required
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white focus:outline-none focus:ring-2 focus:ring-teal-500">
                        <option value="">Loading courses...</option>
                    </select>
                </div>
            </div>

            <!-- Question -->
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs space-y-4">
                <span class="text-xs font-bold text-teal-600 uppercase tracking-wider">Question Configuration</span>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Question Prompt</label>
                    <textarea id="questionText" required
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm"
                        rows="2" placeholder="Type question here..."></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Option A</label>
                        <input type="text" id="optionA" required
                            class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Option B</label>
                        <input type="text" id="optionB" required
                            class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Option C</label>
                        <input type="text" id="optionC" required
                            class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Option D</label>
                        <input type="text" id="optionD" required
                            class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Correct Answer</label>
                    <select id="correctOption" required
                        class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white">
                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                        <option value="C">Option C</option>
                        <option value="D">Option D</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition cursor-pointer shadow-xs disabled:opacity-50">
                Publish Assessment to Classroom
            </button>
        </form>
    </main>

    <script>
        const BASE = "https://edushpere-backend-production.up.railway.app";
        const token = localStorage.getItem("token");

        // Keeps the list of courses this teacher actually owns,
        // fetched fresh from the backend. Used as the source of truth
        // for the ownership guard below.
        let myCourses = [];

        // Load teacher's own courses into the dropdown
        async function loadCourses() {
            try {
                const res = await fetch(`${BASE}/api/courses/my-courses`, {
                    headers: { "Authorization": "Bearer " + token }
                });
                const courses = await res.json();
                const select = document.getElementById("courseId");

                if (!res.ok || !courses || courses.length === 0) {
                    select.innerHTML = '<option value="">No courses found</option>';
                    myCourses = [];
                    return;
                }

                myCourses = courses;

                select.innerHTML = courses.map(c =>
                    `<option value="${c.id}">${c.title}</option>`
                ).join('');

            } catch (err) {
                console.error("Failed to load courses:", err);
                document.getElementById("courseId").innerHTML =
                    '<option value="">Failed to load courses</option>';
            }
        }

        loadCourses();

        // Guard: confirms the selected courseId is actually one of
        // THIS teacher's own courses (from myCourses, fetched via
        // /api/courses/my-courses). Blocks submission if someone
        // tampers with the dropdown value or it's somehow stale.
        function isOwnCourse(courseId) {
            return myCourses.some(c => String(c.id) === String(courseId));
        }

        // Submit quiz to backend
        document.getElementById("createQuizForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const submitBtn = document.getElementById("submitBtn");
            const errorAlert = document.getElementById("errorAlert");
            const errorMessage = document.getElementById("errorMessage");
            const successAlert = document.getElementById("successAlert");

            errorAlert.classList.add("hidden");
            successAlert.classList.add("hidden");

            const selectedCourseId = document.getElementById("courseId").value;

            // Client-side ownership check before we even hit the network
            if (!isOwnCourse(selectedCourseId)) {
                errorMessage.innerText = "You can only publish quizzes to your own courses.";
                errorAlert.classList.remove("hidden");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = "Publishing...";

            const payload = {
                title: document.getElementById("quizTitle").value,
                topic: document.getElementById("quizTopic").value,
                courseId: selectedCourseId,
                questions: [
                    {
                        questionText: document.getElementById("questionText").value,
                        optionA: document.getElementById("optionA").value,
                        optionB: document.getElementById("optionB").value,
                        optionC: document.getElementById("optionC").value,
                        optionD: document.getElementById("optionD").value,
                        correctOption: document.getElementById("correctOption").value
                    }
                ]
            };

            try {
                const res = await fetch(`${BASE}/api/quizzes`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Failed to publish quiz.");
                }

                successAlert.classList.remove("hidden");
                setTimeout(() => {
                    window.location.href = "04_Teacher-Dashboard.html";
                }, 2000);

            } catch (err) {
                errorMessage.innerText = err.message;
                errorAlert.classList.remove("hidden");
                submitBtn.disabled = false;
                submitBtn.innerText = "Publish Assessment to Classroom";
            }
        });
    </script>
</body>
</html>
