<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Build Assessment</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <main class="max-w-2xl mx-auto px-4 py-12">
        <div class="mb-6">
            <a href="teacher-dashboard.html" class="text-xs font-semibold text-teal-600 hover:underline">&larr; Back to Control Center</a>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Build New Quiz</h1>
            <p class="text-sm text-slate-500">Configure objective assessments with targeting parameters for the auto-grading system.</p>
        </div>

        <form id="createQuizForm" class="space-y-6">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Quiz Title</label>
                    <input type="text" id="quizTitle" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" placeholder="e.g., Quiz 2: Advanced Flexbox Mapping">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Target Knowledge Domain / Topic</label>
                    <input type="text" id="quizTopic" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" placeholder="e.g., CSS Layouts">
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs space-y-4">
                <span class="text-xs font-bold text-teal-600 uppercase tracking-wider">Question Configuration</span>
                <div>
                    <label class="block text-sm font-medium text-slate-700">Question Prompt</label>
                    <textarea required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" rows="2" placeholder="Type question details here..."></textarea>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Option A</label>
                        <input type="text" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-medium text-slate-500">Option B</label>
                        <input type="text" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700">Correct Choice Designation</label>
                    <select required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white">
                        <option value="A">Option A</option>
                        <option value="B">Option B</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl transition cursor-pointer shadow-xs">Publish Assessment to Classroom</button>
        </form>
    </main>
</body>
</html>
