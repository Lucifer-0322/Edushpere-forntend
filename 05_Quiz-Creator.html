<script>
const BASE = "https://edushpere-backend-production.up.railway.app";
const token = localStorage.getItem("token");

document.getElementById("createQuizForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const title    = document.getElementById("quizTitle").value;
    const topic    = document.getElementById("quizTopic").value;

    // Get course ID — hardcode for now since you have 1 course
    // Replace this with real course ID from your database
    const courseId = "PASTE_YOUR_REAL_COURSE_ID_HERE";

    // Build questions array from form
    const questionText  = document.querySelector("textarea").value;
    const optionA       = document.querySelectorAll("input[type=text]")[2].value;
    const optionB       = document.querySelectorAll("input[type=text]")[3].value;
    const correctOption = document.querySelector("select").value;

    const questions = [{
        questionText,
        optionA,
        optionB,
        optionC: "N/A",
        optionD: "N/A",
        correctOption
    }];

    const submitBtn = document.querySelector("button[type=submit]");
    submitBtn.disabled = true;
    submitBtn.innerText = "Saving...";

    try {
        const res = await fetch(`${BASE}/api/quizzes`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({ title, topic, courseId, questions })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Failed to create quiz.");
        }

        alert("Quiz created successfully!");
        window.location.href = "04_Teacher-Dashboard.html";

    } catch (err) {
        alert("Error: " + err.message);
        submitBtn.disabled = false;
        submitBtn.innerText = "Publish Assessment to Classroom";
    }
});
</script>
