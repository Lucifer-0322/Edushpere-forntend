<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Forgot Password</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="inline-flex items-center justify-center p-3 bg-teal-600 rounded-xl text-white shadow-md mb-4">
            🔑
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900">Reset Password</h2>
        <p class="mt-2 text-sm text-slate-600">Enter your email to receive a reset link</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-slate-100">

            <div id="successAlert" class="hidden mb-4 p-3 bg-green-50 border-l-4 border-green-500 rounded text-green-800 text-sm">
                ✅ If this email exists in our system, a reset link has been sent. Please check your inbox.
            </div>

            <div id="errorAlert" class="hidden mb-4 p-3 bg-red-50 border-l-4 border-red-500 rounded text-red-700 text-sm">
                <span id="errorMsg">Something went wrong.</span>
            </div>

            <form id="forgotForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700">Email address</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 002-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <input type="email" id="emailInput" required
                            class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm"
                            placeholder="name@university.edu">
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-teal-600 hover:bg-teal-700 transition cursor-pointer disabled:opacity-50">
                    Send Reset Link
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="01_login.html" class="text-sm font-medium text-teal-600 hover:text-teal-500">
                    &larr; Back to Login
                </a>
            </div>
        </div>
    </div>

    <script>
        const BASE = "https://edushpere-backend-production.up.railway.app";

        document.getElementById("forgotForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("emailInput").value.trim();
            const submitBtn = document.getElementById("submitBtn");
            const successAlert = document.getElementById("successAlert");
            const errorAlert = document.getElementById("errorAlert");

            successAlert.classList.add("hidden");
            errorAlert.classList.add("hidden");
            submitBtn.disabled = true;
            submitBtn.innerText = "Sending...";

            try {
                // Check if user exists in the system
                const res = await fetch(`${BASE}/api/auth/forgot-password`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });

                // Always show success message for security
                // (don't reveal if email exists or not)
                successAlert.classList.remove("hidden");
                document.getElementById("forgotForm").classList.add("hidden");

            } catch (err) {
                // Even on error, show success for security
                successAlert.classList.remove("hidden");
                document.getElementById("forgotForm").classList.add("hidden");
            }
        });
    </script>
</body>
</html>
