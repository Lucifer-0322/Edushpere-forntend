<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Upload Materials</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="js/guard.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <main class="max-w-xl mx-auto px-4 py-12">
        <div class="mb-6">
            <a href="teacher-dashboard.html" class="text-xs font-semibold text-teal-600 hover:underline">&larr; Back to Control Center</a>
            <h1 class="text-3xl font-bold text-slate-900 mt-2">Upload Syllabus Material</h1>
            <p class="text-sm text-slate-500">Distribute lecture records, notes, and asset reference sheets to your active classes[cite: 201].</p>
        </div>

        <form id="uploadMaterialForm" class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-700">Display Asset Name</label>
                <input type="text" required class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 text-sm" placeholder="e.g., Lesson 3 Reference Blueprint Guide">
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700">Target Classroom Assignment</label>
                <select class="mt-1 block w-full px-3 py-2 border border-slate-300 rounded-md text-sm bg-white">
                    <option>Introduction to Web Technologies</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-2">Select File Asset (PDF, MP4, JPEG)</label>
                <div class="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50/50 hover:bg-slate-50 transition cursor-pointer relative">
                    <input type="file" required class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" id="mediaFileAsset">
                    <span class="text-3xl block mb-2">📁</span>
                    <span class="text-sm font-semibold text-slate-700 block">Click here to attach document data</span>
                    <span class="text-xs text-slate-400 mt-1 block">Maximum upload file capacity: 10MB</span>
                </div>
            </div>

            <button type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-2.5 rounded-lg transition cursor-pointer">Commit File Upload to Cloudinary</button>
        </form>
    </main>
</body>
</html>
