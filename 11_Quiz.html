<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Active Assessment</title>
    <script src="js/guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col justify-between">

    <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shadow-xs">
        <span class="font-bold text-slate-900 text-sm" id="quizHeaderTitle">Assessment Window: Quiz 1</span>
        <span class="text-xs bg-red-50 text-red-700 border border-red-200 font-bold px-3 py-1.5 rounded-md uppercase tracking-wider">
            Active Test Environment
        </span>
    </nav>

    <main class="max-w-3xl mx-auto w-full px-4 py-12 flex-1">

        <!-- No Quiz ID Error (shown if ?id= is missing from URL) -->
        <div id="noIdAlert" class="hidden mb-6 p-4 bg-yellow-50 border-l-4 border-yellow-500 rounded text-yellow-800 text-sm">
            ⚠️ No quiz selected. Redirecting to courses...
        </div>

        <div id="errorAlert" class="hidden mb-6 p-3 bg-red-50 border-l-4 border-red-500 rounded text-red-700 text-sm flex items-center gap-2">
            <svg class="w-5 h-5 flex-shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span id="errorMessage">Failed to commit assessment data stack.</span>
        </div>

        <form id="quizForm" class="space-y-6">

            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs">
                <span class="text-xs font-bold text-teal-600 block mb-1">Question 1 of 1</span>
                <p class="font-semibold text-slate-900 mb-4 text-base">Which HTML5 element is specifically used to define independent, self-contained content layout zones?</p>

                <div class="space-y-2.5">
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 transition">
                        <input type="radio" name="question_1" value="div" required class="w-4 h-4 text-teal-600 focus:ring-teal-500 border-slate-300">
                        <span class="text-sm font-medium text-slate-700">&lt;div&gt;</span>
                    </label>
                    <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:bg-slate-50 transition">
                        <input type="radio" name="question_1" value="article" required class="w-4 h-4 text-teal-600 focus:ring-teal-500 border-slate-300">
                        <span class="text-sm font-medium text-slate-700">&lt;article&gt;</span>
                    </label>
                </div>
            </div>

            <button id="submitQuizButton" type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-bold py-3 rounded-xl shadow-md transition cursor-pointer disabled:opacity-50">
                Submit Assessment for Grading
            </button>
        </form>
    </main>

    <script>
        // ✅ FIX: Get quiz ID from URL — no hardcoded fallback
        const urlParams = new URLSearchParams(window.location.search);
        const quizId = urlParams.get("id");

        // ✅ FIX: If no ID in URL, show warning and redirect
        if (!quizId) {
            document.getElementById("noIdAlert").classList.remove("hidden");
            document.getElementById("quizForm").classList.add("hidden");
            setTimeout(() => {
                window.location.href = "09_Course.html";
            }, 2000);
        }

        document.getElementById("quizForm").addEventListener("submit", async (event) => {
            event.preventDefault();

            const errorAlert = document.getElementById("errorAlert");
            const errorMessage = document.getElementById("errorMessage");
            const submitButton = document.getElementById("submitQuizButton");

            const SUBMIT_API_URL = `https://edushpere-backend-production.up.railway.app/api/quizzes/${quizId}/submit`;

            // Reset state
            errorAlert.classList.add("hidden");
            submitButton.disabled = true;
            submitButton.innerText = "Transmitting assessment parameters to server...";

            // Gather answers
            const formData = new FormData(event.target);
            const answersPayload = {};
            formData.forEach((value, key) => {
                answersPayload[key] = value;
            });

            try {
                const token = localStorage.getItem("token");

                const response = await fetch(SUBMIT_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify({ answers: answersPayload })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Server rejected assessment submission processing.");
                }

                // Redirect to result page
                window.location.href = `12_Result.html?score=${data.score}&total=${data.totalMarks || 1}`;

            } catch (err) {
                errorMessage.innerText = err.message;
                errorAlert.classList.remove("hidden");
                submitButton.disabled = false;
                submitButton.innerText = "Submit Assessment for Grading";
            }
        });
    </script>
</body>
</html>
