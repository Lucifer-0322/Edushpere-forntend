<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSphere AI - Secure Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">

    <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
        <div class="inline-flex items-center justify-center p-3 bg-teal-600 rounded-xl text-white shadow-md mb-4">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-slate-900 tracking-tight">EduSphere AI</h2>
        <p class="mt-2 text-sm text-slate-600">Adaptive Learning & Assessment Management System</p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-slate-100">
            
            <div id="errorAlert" class="hidden mb-4 p-3 bg-red-50 border-l-4 border-red-500 rounded text-red-700 text-sm flex items-center gap-2">
                <svg class="w-5 h-5 flex-shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                <span id="errorMessage">Invalid credentials profile configuration.</span>
            </div>
            
            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="loginEmail" class="block text-sm font-medium text-slate-700">Email address</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 002-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <input id="loginEmail" type="email" required class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="name@university.edu">
                    </div>
                </div>

                <div>
                    <label for="loginPassword" class="block text-sm font-medium text-slate-700">Password</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input id="loginPassword" type="password" required class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 text-sm" placeholder="••••••••">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-teal-600 focus:ring-teal-500 border-slate-300 rounded cursor-pointer">
                        <label for="remember-me" class="ml-2 block text-sm text-slate-900 cursor-pointer">Remember me</label>
                    </div>
                    <div class="text-sm">
                        <a href="#" class="font-medium text-teal-600 hover:text-teal-500">Forgot password?</a>
                    </div>
                </div>

                <div>
                    <button id="submitButton" type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-semibold text-white bg-teal-600 hover:bg-teal-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-500 transition-all cursor-pointer disabled:opacity-50">
                        Sign In
                    </button>
                </div>
            </form>

            <div class="mt-6 relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-slate-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-slate-500">New to the platform?</span>
                </div>
            </div>

            <div class="mt-6 text-center">
                <p class="text-sm text-slate-600">
                    Don't have an account? 
                    <a href="02_Register.html" class="font-semibold text-teal-600 hover:text-teal-500 transition-colors ml-1">
                        Sign up here
                    </a>
                </p>
            </div>

        </div>
    </div>

    <script>
        // Adjust this variable profile target once your Node backend runs live on Railway
        const BACKEND_API_URL = "https://edushpere-backend-production.up.railway.app/api/auth/login";
        document.getElementById("loginForm").addEventListener("submit", async (event) => {
            event.preventDefault(); // Lock the default page refresh behavior

            // Target UI DOM component state values
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;
            const errorAlert = document.getElementById("errorAlert");
            const errorMessage = document.getElementById("errorMessage");
            const submitButton = document.getElementById("submitButton");

            // Reset dynamic message interfaces
            errorAlert.classList.add("hidden");
            submitButton.disabled = true;
            submitButton.innerText = "Verifying Account Identity...";

            try {
                // Execute standard async server call via Native Fetch API
                const response = await fetch(BACKEND_API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                // If backend throws an interception error status, forward to the catch node
                if (!response.ok) {
                    throw new Error(data.error || "Authentication server connection rejected.");
                }

                // SECURE PAYLOAD TO LOCALSTORAGE: Fulfilling Phase 2 requirements
                localStorage.setItem("token", data.token);
                localStorage.setItem("userRole", data.role);
                localStorage.setItem("userName", data.name);

                // ROLE-BASED ACCESS CONTROL REDIRECTS WITH JS REDIRECTS
                if (data.role === "STUDENT") {
                    window.location.href = "03_Student-Dashboard.html";
                } else if (data.role === "TEACHER") {
                    window.location.href = "04_Teacher-Dashboard.html";
                } else if (data.role === "ADMIN") {
                    window.location.href = "08_Admin-Dashboard.html";
                } else {
                    throw new Error("System Identity profiles could not verify target destination.");
                }

            } catch (err) {
                // Expose captured exception vectors right inside the layout context safely
                errorMessage.innerText = err.message;
                errorAlert.classList.remove("hidden");
                
                // Re-enable interactive elements for subsequent retries
                submitButton.disabled = false;
                submitButton.innerText = "Sign In";
            }
        });
    </script>
</body>
</html>
